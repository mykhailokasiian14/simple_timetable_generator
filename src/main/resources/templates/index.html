<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Simple Timetable Generator.kpik</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/stg_logo.png}">
</head>
<!--body class="bg-white min-h-screen flex flex-col font-sans"-->
<body class="bg-gradient-to-br from-blue-200 via-blue-400 to-blue-600 min-h-screen flex flex-col font-sans p-4">
<header class="w-full flex items-center justify-between px-6 py-4">

  <a href="/" class="flex items-center gap-4 hover:opacity-80 transition-opacity cursor-pointer">
    <img th:src="@{/stg_logo.png}" alt="STG Logo" class="w-14 h-14 object-contain rounded-xl shadow-sm">

    <h1 class="text-2xl font-extrabold text-black tracking-tight select-none">Simple Timetable Generator.kpik</h1>
  </a>

  <nav class="hidden md:flex gap-8 font-medium text-gray-900 mr-4">
    <a href="/tutorial" class="hover:text-blue-600 transition">Як Користуватися</a>
    <a href="/about" class="hover:text-blue-600 transition">Про Застосунок</a>
  </nav>
</header>

<main class="flex-1 w-full flex items-center justify-center p-6">

  <div class="bg-blue-100 w-full max-w-6xl rounded-t-none rounded-b-[40px] md:rounded-[40px] pt-16 pb-24 px-8 text-center relative overflow-hidden flex flex-col items-center">


    <h2 class="text-6xl md:text-7xl font-extrabold text-blue-950 mt-8 mb-8 leading-tight tracking-tight">
      Інтелектуальний розклад
    </h2>

    <p class="text-xl md:text-2xl text-blue-900 font-medium max-w-3xl mb-12 leading-relaxed">
      Забудьте про ручне перебирання пар та конфлікти аудиторій.<br>
      Завантажте дані, а наш алгоритм на базі <span class="font-extrabold text-blue-950">Timefold AI</span> створить<br>
      ідеальний графік за лічені секунди.
    </p>

    <a href="/upload" class="inline-flex items-center justify-center px-12 py-5 bg-blue-600 hover:bg-blue-700 text-white font-bold text-2xl rounded-2xl transition-all duration-300 shadow-lg hover:shadow-blue-500/40 hover:-translate-y-1">
      Почати створення
    </a>

  </div>
</main>

</body>
</html>
