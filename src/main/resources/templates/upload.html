<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Завантаження даних - STG kpik</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/stg_logo.png}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-200 via-blue-400 to-blue-600 min-h-screen flex flex-col font-sans p-4">

<header class="w-full flex items-center justify-between px-6 py-4">
    <a href="/" class="flex items-center gap-4 hover:opacity-80 transition-opacity cursor-pointer">
        <img th:src="@{/stg_logo.png}" alt="STG Logo" class="w-14 h-14 object-contain rounded-xl shadow-sm">
        <h1 class="text-2xl font-extrabold text-black tracking-tight select-none">Simple Timetable Generator.kpik</h1>
    </a>

    <nav class="hidden md:flex gap-8 font-medium text-gray-900 mr-4">
        <a href="/tutorial" class="hover:text-blue-600 transition">Як Користуватися</a>
        <a href="/about" class="hover:text-blue-600 transition">Про Застосунок</a>
    </nav>
</header>

<main class="flex-1 w-full flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md" x-data="{ fileType: 'excel' }">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Вхідні дані</h1>
            <p class="text-sm text-gray-500 mt-2">Завантажте файл з навчальним навантаженням</p>
        </div>

        <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-6">

            <div class="flex space-x-4">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="fileType" value="excel" x-model="fileType" class="peer sr-only">
                    <div class="text-center p-3 border-2 rounded-lg peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-gray-50 transition">
                        Файл Excel (.xlsx)
                    </div>
                </label>

                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="fileType" value="access" x-model="fileType" class="peer sr-only">
                    <div class="text-center p-3 border-2 rounded-lg peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-gray-50 transition">
                        Файл Access (.accdb)
                    </div>
                </label>
            </div>

            <div x-show="fileType === 'access'" x-collapse x-cloak>
                <label class="block text-sm font-medium text-gray-700 mb-2">Оберіть семестр</label>
                <select name="semester" class="w-full border-gray-300 border rounded-lg p-3 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <option value="1">1-й семестр (Осінній)</option>
                    <option value="2">2-й семестр (Весняний)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Оберіть файл</label>
                <input type="file" name="file" required accept=".xlsx, .xls, .accdb, .mdb"
                       class="block w-full text-sm text-gray-500
                                  file:mr-4 file:py-2 file:px-4
                                  file:rounded-lg file:border-0
                                  file:text-sm file:font-semibold
                                  file:bg-blue-50 file:text-blue-700
                                  hover:file:bg-blue-100 cursor-pointer border border-gray-300 rounded-lg p-1">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                Завантажити та продовжити
            </button>

        </form>
    </div>
</main>

</body>
</html>
