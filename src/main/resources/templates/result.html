<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Готово! - STG kpik</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/stg_logo.png}">
</head>
<body class="bg-gradient-to-br from-blue-200 via-blue-400 to-blue-600 min-h-screen flex flex-col font-sans p-4">
<header class="w-full flex items-center justify-between px-6 py-4">
    <a href="/" class="flex items-center gap-4 hover:opacity-80 transition-opacity cursor-pointer">
        <img th:src="@{/stg_logo.png}" alt="STG Logo" class="w-14 h-14 object-contain rounded-xl shadow-sm">
        <h1 class="text-2xl font-extrabold text-black tracking-tight select-none">Simple Timetable Generator.kpik</h1>
    </a>

    <nav class="hidden md:flex gap-8 font-medium text-gray-900 mr-4">
        <a href="/tutorial" class="hover:text-blue-600 transition">Як Користуватися</a>
        <a href="/about" class="hover:text-blue-600 transition">Про Застосунок</a>
    </nav>
</header>
<main class="flex-1 w-full flex items-center justify-center p-6">
    <div class="bg-blue-100 p-10 rounded-2xl shadow-2xl w-full max-w-lg text-center border border-blue-200">

        <div class="mb-8">
            <h1 class="text-2xl font-extrabold text-gray-950 tracking-tight">Розклад створено!</h1>
            <p class="text-sm text-gray-500 mt-2">STG успішно оптимізував та розподілив усі пари.</p>
        </div>

        <div class="flex flex-col space-y-4">

            <a href="/api/excel/download-total-timetable"
               class="flex items-center justify-center gap-2 w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold text-base rounded-xl transition duration-200 shadow-sm">
                Завантажити загальний розклад
            </a>

            <a href="/api/excel/download-split-timetable"
               class="flex items-center justify-center gap-2 w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold text-base rounded-xl transition duration-200 shadow-sm">
                Завантажити розклад, окремо по групах
            </a>

        </div>

        <div class="mt-8 pt-6 border-t border-gray-600">
            <a href="/" class="text-sm font-medium text-gray-500 hover:text-gray-600 transition">
                ← Спочатку
            </a>
        </div>

    </div>
</main>
</body>
</html>
